<div class="rp-page">
  <div class="rp-card">
    <div class="rp-logo-wrapper">
      <img src="/itLogo.png" alt="IT Logo" class="rp-logo" />
    </div>

    <h1 class="rp-title">Reset Password</h1>
    <p class="rp-subtitle">Create a strong new password for your account.</p>

    <form class="rp-form" (ngSubmit)="onSubmit()" #resetForm="ngForm">

      <!-- New Password -->
      <div class="rp-field" [class.rp-field--error]="newPasswordInput.invalid && newPasswordInput.touched">
        <label for="newPassword" class="rp-label">New Password</label>
        <div class="rp-input-wrapper">
          <span class="rp-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            id="newPassword"
            name="newPassword"
            class="rp-input"
            [type]="showNew ? 'text' : 'password'"
            placeholder="Enter new password"
            [(ngModel)]="newPassword"
            #newPasswordInput="ngModel"
            required
            minlength="8"
          />
          <button type="button" class="rp-toggle" (click)="showNew = !showNew" aria-label="Toggle visibility">
            <svg *ngIf="!showNew" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showNew" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="rp-error-msg" *ngIf="newPasswordInput.invalid && newPasswordInput.touched">
          <ng-container *ngIf="newPasswordInput.errors?.['required']">Password is required.</ng-container>
          <ng-container *ngIf="newPasswordInput.errors?.['minlength']">Must be at least 8 characters.</ng-container>
        </span>
        <!-- Strength bar -->
        <div class="rp-strength" *ngIf="newPassword">
          <div class="rp-strength-bar">
            <span [class]="'rp-strength-fill rp-strength-' + passwordStrength(newPassword)"></span>
          </div>
          <span class="rp-strength-label">{{ passwordStrength(newPassword) | titlecase }}</span>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="rp-field" [class.rp-field--error]="confirmPasswordInput.invalid && confirmPasswordInput.touched || (confirmPassword && confirmPassword !== newPassword)">
        <label for="confirmPassword" class="rp-label">Confirm Password</label>
        <div class="rp-input-wrapper">
          <span class="rp-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </span>
          <input
            id="confirmPassword"
            name="confirmPassword"
            class="rp-input"
            [type]="showConfirm ? 'text' : 'password'"
            placeholder="Re-enter new password"
            [(ngModel)]="confirmPassword"
            #confirmPasswordInput="ngModel"
            required
          />
          <button type="button" class="rp-toggle" (click)="showConfirm = !showConfirm" aria-label="Toggle visibility">
            <svg *ngIf="!showConfirm" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showConfirm" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="rp-error-msg" *ngIf="confirmPasswordInput.touched && confirmPasswordInput.errors?.['required']">
          Please confirm your password.
        </span>
        <span class="rp-error-msg" *ngIf="confirmPassword && confirmPassword !== newPassword">
          Passwords do not match.
        </span>
        <span class="rp-match-msg" *ngIf="confirmPassword && confirmPassword === newPassword && newPassword">
          ✓ Passwords match
        </span>
      </div>

      <div class="rp-error-banner" *ngIf="errorMessage">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="rp-btn"
        [disabled]="resetForm.invalid || newPassword !== confirmPassword || submitted"
      >
        <span *ngIf="!submitted">Reset Password</span>
        <span *ngIf="submitted" class="rp-spinner"></span>
      </button>

      <div class="rp-success" *ngIf="success">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Password reset successfully!
      </div>
    </form>
  </div>
</div>
